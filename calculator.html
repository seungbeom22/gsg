<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculator</title>
    <style>
:root { --main-theme: #ff9500; --text-color: #000; }

* {
    -webkit-user-select: none;
    -moz-user-select: none;
    user-select: none;
    -webkit-user-drag: none;
    box-sizing: border-box;
}

html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background: #f2f4f7;
    display: flex;
    justify-content: center;
    align-items: center;
}

.layout { display: flex; align-items: flex-start; }

.calculator {
    width: 360px;
    background: #fff;
    padding: 18px;
    border-radius: 28px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.12);
    flex-shrink: 0;
}

.calc-header {
    display: flex; align-items: center; justify-content: center;
    position: relative; margin-bottom: 14px; font-weight: bold; font-size: 20px;
}
.hamburger { font-size: 28px; cursor: pointer; position: absolute; left: 0; z-index: 2; }
.title-text { display: flex; align-items: baseline; gap: 6px; }

.display-wrap { margin-bottom: 12px; }

.mem-label {
    font-size: 11px;
    color: #aaa;
    margin-bottom: 2px;
    padding-left: 4px;
}

#display {
    width: 100%; height: 70px; font-size: 32px; text-align: right;
    border: 2px solid #ddd; border-radius: 10px;
    padding: 8px 12px; background: #fafafa;
    display: block;
}

.buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
button { height: 64px; border-radius: 14px; border: none; font-size: 22px; font-weight: bold; cursor: pointer; background: #e0e0e0; transition: opacity 0.1s; }
button:active { opacity: 0.7; }
.operator { background-color: var(--main-theme); color: var(--text-color); font-size: 30px; }
.btn-ac { background-color: #ff3b30; color: #fff; }
.btn-del { background-color: #ff9500; color: #fff; }
.btn-equals { background-color: var(--main-theme); color: var(--text-color); font-size: 34px; }

.toast {
    height: 0; overflow: hidden; text-align: center; font-size: 14px; font-weight: bold;
    color: #fff; background: rgba(0,0,0,0.7); border-radius: 8px;
    transition: height 0.2s, padding 0.2s, opacity 0.3s; opacity: 0;
}
.toast.show { height: auto; padding: 6px; opacity: 1; margin-bottom: 6px; }

.overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 998; }
.overlay.show { display: block; }
.side-menu { height: 100%; width: 260px; position: fixed; top: 0; left: 0; background: #111; overflow: hidden; transition: transform 0.3s ease; z-index: 1000; transform: translateX(-100%); }
.side-menu.open { transform: translateX(0); }
.closebtn { position: absolute; top: 10px; right: 20px; color: #ff3b30; font-size: 36px; cursor: pointer; }
.menu-content { padding: 18px; color: #fff; margin-top: 50px; }
.theme-buttons { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
.theme-buttons button { height: auto; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; padding: 10px; font-size: 13px; }
.dev-info { margin-bottom: 18px; }
    </style>
</head>
<body>
    <div id="overlay" class="overlay" onclick="closeMenu()"></div>

    <div id="mySidenav" class="side-menu">
        <span class="closebtn" onclick="closeMenu()">&times;</span>
        <div class="menu-content">
            <div class="dev-info">
                <h3>Developer</h3>
                <p>안녕하세요 파수범입니다.<br>이것은 저의 첫 코딩 작품입니다.<br>많은 관심 부탁드립니다.</p>
            </div>
            <h3>테마 설정</h3>
            <div class="theme-buttons">
                <button onclick="changeTheme('#FF3B30')" style="background:#FF3B30;color:#fff;">빨강</button>
                <button onclick="changeTheme('#FF9500')" style="background:#FF9500;color:#fff;">주황</button>
                <button onclick="changeTheme('#FFCC00')" style="background:#FFCC00;color:#000;">노랑</button>
                <button onclick="changeTheme('#4CD964')" style="background:#4CD964;color:#000;">초록</button>
                <button onclick="changeTheme('#007AFF')" style="background:#007AFF;color:#fff;">파랑</button>
                <button onclick="changeTheme('#5AC8FA')" style="background:#5AC8FA;color:#000;">하늘</button>
                <button onclick="changeTheme('#8E8E93')" style="background:#8E8E93;color:#fff;">회색</button>
                <button onclick="changeTheme('#000000')" style="background:#000000;color:#fff;">검정</button>
            </div>
        </div>
    </div>

    <div class="layout">
        <div class="calculator">
            <div class="calc-header">
                <span class="hamburger" onclick="openMenu()">&#9776;</span>
                <span class="title-text">계산기 <small>v2.0</small></span>
            </div>
            <div id="toast" class="toast"></div>

            <div class="display-wrap">
                <div class="mem-label">합계 <span id="mem-label-value">0</span></div>
                <input type="text" id="display" value="0" data-raw="0" readonly>
            </div>

            <div class="buttons">
                <button onclick="memory('MC')">MC</button>
                <button onclick="memory('MR')">MR</button>
                <button onclick="memory('M+')">M+</button>
                <button onclick="memory('M-')">M-</button>

                <button class="btn-ac" onclick="clearDisplay()">AC</button>
                <button class="btn-del" onclick="deleteLast()">⌫</button>
                <button class="operator" onclick="appendToDisplay('/')">÷</button>
                <button class="operator" onclick="appendToDisplay('*')">×</button>

                <button onclick="appendToDisplay('7')">7</button>
                <button onclick="appendToDisplay('8')">8</button>
                <button onclick="appendToDisplay('9')">9</button>
                <button class="operator" onclick="appendToDisplay('-')">-</button>

                <button onclick="appendToDisplay('4')">4</button>
                <button onclick="appendToDisplay('5')">5</button>
                <button onclick="appendToDisplay('6')">6</button>
                <button class="operator" onclick="appendToDisplay('+')">+</button>

                <button onclick="appendToDisplay('1')">1</button>
                <button onclick="appendToDisplay('2')">2</button>
                <button onclick="appendToDisplay('3')">3</button>
                <button onclick="appendToDisplay('.')">.</button>

                <button onclick="appendToDisplay('0')" style="grid-column:span 2;">0</button>
                <button class="operator btn-equals" onclick="calculate()" style="grid-column:span 2;">=</button>
            </div>
        </div>
    </div>

    <script>
let memoryValue = 0;
let freshInput = false;
let memHistory = [];

function openMenu() {
    document.getElementById("mySidenav").classList.add("open");
    document.getElementById("overlay").classList.add("show");
    history.pushState({ menuOpen: true }, '');
}
function closeMenu() {
    document.getElementById("mySidenav").classList.remove("open");
    document.getElementById("overlay").classList.remove("show");
}
window.addEventListener('popstate', function() {
    if (document.getElementById("mySidenav").classList.contains("open")) closeMenu();
});

function changeTheme(color) {
    document.documentElement.style.setProperty('--main-theme', color);
    document.documentElement.style.setProperty('--text-color', color === '#000000' ? '#ffffff' : '#000000');
    closeMenu();
}

function formatDisplay(val) {
    if (val === '' || val === '오류') return val;
    let parts = String(val).split('.');
    parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    return parts.join('.');
}

function formatRawExpression(expr) {
    return expr.replace(/(\d+\.?\d*)/g, function(num) {
        let parts = num.split('.');
        parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        return parts.join('.');
    });
}

function getRaw() {
    let d = document.getElementById('display');
    let raw = d.getAttribute('data-raw');
    if (!raw) raw = d.value;
    return raw.replace(/,/g, '');
}

function setRaw(val) {
    let d = document.getElementById('display');
    d.setAttribute('data-raw', val);
}

function appendToDisplay(val) {
    let d = document.getElementById('display');
    let raw = getRaw();
    const operators = ['+', '-', '*', '/'];
    const isOp = operators.includes(val);

    if (freshInput) {
        if (isOp) { freshInput = false; }
        else { raw = ''; freshInput = false; }
    }

    if (isOp && raw !== '' && raw !== '0') {
        const lastChar = raw.slice(-1);
        if (operators.includes(lastChar)) {
            raw = raw.slice(0, -1) + val;
            setRaw(raw);
            d.value = formatRawExpression(raw);
            return;
        }
    }

    if (raw === '0' || raw === '') {
        raw = isOp ? '0' + val : val;
    } else {
        raw += val;
    }
    setRaw(raw);
    d.value = formatRawExpression(raw);
}

function clearDisplay() {
    let d = document.getElementById('display');
    setRaw('0');
    d.value = '0';
    freshInput = false;
}

function deleteLast() {
    let d = document.getElementById('display');
    let raw = getRaw();
    raw = raw.length <= 1 ? '0' : raw.slice(0, -1);
    setRaw(raw);
    d.value = formatRawExpression(raw);
}

function calculate() {
    try {
        let d = document.getElementById('display');
        let raw = getRaw();
        let result = eval(raw.replace(/×/g, '*').replace(/÷/g, '/'));
        setRaw(String(result));
        d.value = formatDisplay(result);
        freshInput = true;
        history.replaceState(null, '');
    } catch {
        let d = document.getElementById('display');
        setRaw('오류');
        d.value = '오류';
    }
}

function showToast(msg) {
    let t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(window._toastTimer);
    window._toastTimer = setTimeout(() => t.classList.remove('show'), 1500);
}

function updateMemLabel() {
    document.getElementById('mem-label-value').textContent = formatDisplay(memoryValue);
}

function memory(type) {
    let d = document.getElementById('display');
    let raw = getRaw();
    let v = parseFloat(raw) || 0;

    if (type === 'M+') {
        memoryValue += v;
        freshInput = true;
        updateMemLabel();
    } else if (type === 'M-') {
        memoryValue -= v;
        freshInput = true;
        updateMemLabel();
    } else if (type === 'MR') {
        setRaw(String(memoryValue));
        d.value = formatDisplay(memoryValue);
        showToast('MR : ' + formatDisplay(memoryValue));
        freshInput = true;
    } else if (type === 'MC') {
        memoryValue = 0;
        updateMemLabel();
    }
}
    </script>
</body>
</html>
