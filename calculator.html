<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculator</title>
    <style>
        :root { --main-theme: #ff9500; --text-color: #000; }

        * {
            -webkit-user-select: none;
            -moz-user-select: none;
            user-select: none;
            box-sizing: border-box;
        }

        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #f2f4f7;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .layout { display: flex; align-items: flex-start; }

        .calculator {
            width: 360px;
            background: #fff;
            padding: 18px;
            border-radius: 28px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.12);
        }

        .calc-header {
            display: flex; align-items: center; justify-content: center;
            position: relative; margin-bottom: 14px; font-weight: bold; font-size: 20px;
        }
        .hamburger { font-size: 28px; cursor: pointer; position: absolute; left: 0; z-index: 2; }
        .title-text { display: flex; align-items: baseline; gap: 6px; }

        .display-wrap { margin-bottom: 12px; position: relative; }

        .mem-label {
            position: absolute; top: 6px; right: 10px;
            font-size: 10px; color: #aaa;
        }
        .mr-label {
            position: absolute; top: 6px; left: 10px;
            font-size: 10px; color: #aaa;
        }

        #display {
            width: 100%; height: 70px; font-size: 38px; text-align: right;
            border: 2px solid #ddd; border-radius: 10px;
            padding: 8px 12px; background: #fafafa;
            display: block; outline: none;
        }

        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        button {
            height: 64px; border-radius: 14px; border: none;
            font-size: 22px; font-weight: bold; cursor: pointer;
            background: #e0e0e0; transition: opacity 0.1s;
        }
        button:active { opacity: 0.7; }
        .operator { background-color: var(--main-theme); color: var(--text-color); font-size: 30px; }
        .btn-ac { background-color: #ff3b30; color: #fff; }
        .btn-del { background-color: #ff9500; color: #fff; }
        .btn-equals { background-color: var(--main-theme); color: var(--text-color); font-size: 34px; }

        .toast {
            height: 0; overflow: hidden; text-align: center; font-size: 14px; font-weight: bold;
            color: #fff; background: rgba(0,0,0,0.7); border-radius: 8px;
            transition: height 0.2s, padding 0.2s, opacity 0.3s; opacity: 0;
        }
        .toast.show { height: auto; padding: 6px; opacity: 1; margin-bottom: 6px; }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 998; }
        .overlay.show { display: block; }
        .side-menu {
            height: 100%; width: 260px; position: fixed; top: 0; left: 0;
            background: #111; overflow: hidden; transition: transform 0.3s ease;
            z-index: 1000; transform: translateX(-100%);
        }
        .side-menu.open { transform: translateX(0); }
        .closebtn { position: absolute; top: 10px; right: 20px; color: #ff3b30; font-size: 36px; cursor: pointer; }
        .menu-content { padding: 18px; color: #fff; margin-top: 50px; }
        .theme-buttons { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .theme-buttons button { height: auto; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; padding: 10px; font-size: 13px; }
        .dev-info { margin-bottom: 18px; }
    </style>
</head>
<body>
    <div id="overlay" class="overlay" onclick="closeMenu()"></div>

    <div id="mySidenav" class="side-menu">
        <span class="closebtn" onclick="closeMenu()">&times;</span>
        <div class="menu-content">
            <div class="dev-info">
                <h3>Developer</h3>
                <p>안녕하세요 파수범입니다.<br>이것은 저의 첫 코딩 작품입니다.<br>많은 관심 부탁드립니다.</p>
            </div>
            <h3>테마 설정</h3>
            <div class="theme-buttons">
                <button onclick="changeTheme('#FF3B30','#fff')" style="background:#FF3B30;color:#fff;">빨강</button>
                <button onclick="changeTheme('#FF9500','#000')" style="background:#FF9500;color:#fff;">주황</button>
                <button onclick="changeTheme('#FFCC00','#000')" style="background:#FFCC00;color:#000;">노랑</button>
                <button onclick="changeTheme('#4CD964','#000')" style="background:#4CD964;color:#000;">초록</button>
                <button onclick="changeTheme('#007AFF','#fff')" style="background:#007AFF;color:#fff;">파랑</button>
                <button onclick="changeTheme('#5AC8FA','#000')" style="background:#5AC8FA;color:#000;">하늘</button>
                <button onclick="changeTheme('#8E8E93','#fff')" style="background:#8E8E93;color:#fff;">회색</button>
                <button onclick="changeTheme('#000000','#fff')" style="background:#000000;color:#fff;">검정</button>
            </div>
        </div>
    </div>

    <div class="layout">
        <div class="calculator">
            <div class="calc-header">
                <span class="hamburger" onclick="openMenu()">&#9776;</span>
                <span class="title-text">계산기 <small>v2.0</small></span>
            </div>
            <div id="toast" class="toast"></div>

            <div class="display-wrap">
                <div class="mr-label">MR <span id="mr-label-value" style="display:none;">0</span></div>
                <div class="mem-label">합계 <span id="mem-label-value">0</span></div>
                <input type="text" id="display" value="0" readonly>
            </div>

            <div class="buttons">
                <button onclick="memory('MC')">MC</button>
                <button onclick="memory('MR')">MR</button>
                <button onclick="memory('M+')">M+</button>
                <button onclick="memory('M-')">M-</button>

                <button class="btn-ac" onclick="clearDisplay()">AC</button>
                <button class="btn-del" onclick="deleteLast()">⌫</button>
                <button class="operator" onclick="appendToDisplay('/')">÷</button>
                <button class="operator" onclick="appendToDisplay('*')">×</button>

                <button onclick="appendToDisplay('7')" style="font-size:30px">7</button>
                <button onclick="appendToDisplay('8')" style="font-size:30px">8</button>
                <button onclick="appendToDisplay('9')" style="font-size:30px">9</button>
                <button class="operator" onclick="appendToDisplay('-')">-</button>

                <button onclick="appendToDisplay('4')" style="font-size:30px">4</button>
                <button onclick="appendToDisplay('5')" style="font-size:30px">5</button>
                <button onclick="appendToDisplay('6')" style="font-size:30px">6</button>
                <button class="operator" onclick="appendToDisplay('+')">+</button>

                <button onclick="appendToDisplay('1')" style="font-size:30px">1</button>
                <button onclick="appendToDisplay('2')" style="font-size:30px">2</button>
                <button onclick="appendToDisplay('3')" style="font-size:30px">3</button>
                <button class="operator" onclick="calcPercent()">%</button>

                <button onclick="appendToDisplay('0')" style="font-size:30px">0</button>
                <button onclick="appendToDisplay('.')">.</button>
                <button class="operator btn-equals" onclick="calculate()" style="grid-column:span 2;">=</button>
            </div>
        </div>
    </div>

    <script>
        let memValue = 0;
        let freshInput = true;

        function getRaw() {
            return document.getElementById('display').dataset.raw || '0';
        }

        function formatDisplay(num) {
            if (isNaN(num) || num === null) return '오류';
            return num.toLocaleString('ko-KR', { maximumFractionDigits: 10 });
        }

        function appendToDisplay(val) {
            const d = document.getElementById('display');
            let raw = getRaw();
            const ops = ['+', '-', '*', '/'];

            if (freshInput) {
                if (ops.includes(val)) {
                    // append operator to current result
                    raw = raw + val;
                    freshInput = false;
                } else {
                    raw = val === '.' ? '0.' : val;
                    freshInput = false;
                }
            } else {
                const lastChar = raw.slice(-1);
                if (ops.includes(val) && ops.includes(lastChar)) {
                    raw = raw.slice(0, -1) + val;
                } else if (val === '.' && /\.\d*$/.test(raw.split(/[+\-*/]/).pop())) {
                    return; // already has decimal
                } else {
                    raw = raw + val;
                }
            }

            d.dataset.raw = raw;
            // Show expression while typing, formatted number after result
            try {
                const segments = raw.split(/([+\-*/])/);
                const lastNum = segments[segments.length - 1];
                if (lastNum && !isNaN(parseFloat(lastNum)) && !ops.includes(raw.slice(-1))) {
                    d.value = formatDisplay(parseFloat(lastNum));
                } else {
                    d.value = raw.replace(/\*/g, '×').replace(/\//g, '÷');
                }
            } catch(e) {
                d.value = raw;
            }
        }

        function calculate() {
            const d = document.getElementById('display');
            let raw = getRaw();
            try {
                let result = eval(raw);
                result = parseFloat(parseFloat(result).toPrecision(10));
                d.dataset.raw = String(result);
                d.value = formatDisplay(result);
                freshInput = true;
            } catch(e) {
                d.dataset.raw = '오류';
                d.value = '오류';
                freshInput = true;
            }
        }

        function clearDisplay() {
            const d = document.getElementById('display');
            d.dataset.raw = '0';
            d.value = '0';
            freshInput = true;
            document.getElementById('mr-label-value').style.display = 'none';
        }

        function deleteLast() {
            const d = document.getElementById('display');
            let raw = getRaw();
            if (freshInput || raw === '오류') {
                clearDisplay(); return;
            }
            raw = raw.slice(0, -1) || '0';
            d.dataset.raw = raw;
            try {
                const segments = raw.split(/([+\-*/])/);
                const lastNum = segments[segments.length - 1];
                d.value = lastNum ? lastNum : raw;
            } catch(e) { d.value = raw; }
            if (raw === '0') freshInput = true;
        }

        function calcPercent() {
            const d = document.getElementById('display');
            let raw = getRaw();
            try {
                const match = raw.match(/^(.*[+\-*/])(\-?\d+\.?\d*)$/);
                let result;
                if (match) {
                    const base = eval(match[1].slice(0, -1));
                    const pct = parseFloat(match[2]) / 100;
                    result = base * pct;
                    raw = match[1] + result;
                    d.dataset.raw = raw;
                    d.value = formatDisplay(result);
                } else {
                    const num = parseFloat(raw.replace(/,/g, ''));
                    if (isNaN(num)) return;
                    result = parseFloat((num / 100).toPrecision(10));
                    d.dataset.raw = String(result);
                    d.value = formatDisplay(result);
                }
                freshInput = true;
            } catch(e) {}
        }

        function memory(op) {
            const d = document.getElementById('display');
            const cur = parseFloat(getRaw().replace(/,/g, '')) || 0;
            if (op === 'MC') {
                memValue = 0;
                document.getElementById('mem-label-value').textContent = '0';
                const mrVal = document.getElementById('mr-label-value');
                mrVal.style.display = 'none';
                showToast('메모리 초기화');
            } else if (op === 'MR') {
                d.dataset.raw = String(memValue);
                d.value = formatDisplay(memValue);
                freshInput = true;
                const mrVal = document.getElementById('mr-label-value');
                mrVal.textContent = formatDisplay(memValue);
                mrVal.style.display = 'inline';
                showToast('MR: ' + formatDisplay(memValue));
            } else if (op === 'M+') {
                memValue = parseFloat((memValue + cur).toPrecision(10));
                document.getElementById('mem-label-value').textContent = formatDisplay(memValue);
                showToast('M+: ' + formatDisplay(memValue));
            } else if (op === 'M-') {
                memValue = parseFloat((memValue - cur).toPrecision(10));
                document.getElementById('mem-label-value').textContent = formatDisplay(memValue);
                showToast('M-: ' + formatDisplay(memValue));
            }
        }

        let toastTimer;
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
        }

        function openMenu() {
            document.getElementById('mySidenav').classList.add('open');
            document.getElementById('overlay').classList.add('show');
        }

        function closeMenu() {
            document.getElementById('mySidenav').classList.remove('open');
            document.getElementById('overlay').classList.remove('show');
        }

        function changeTheme(color, textColor) {
            document.documentElement.style.setProperty('--main-theme', color);
            document.documentElement.style.setProperty('--text-color', textColor || '#000');
            closeMenu();
        }

        // Initialize display raw value
        document.getElementById('display').dataset.raw = '0';
    </script>
</body>
</html>
