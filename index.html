<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="mySidenav" class="side-menu">
        <span class="closebtn" onclick="closeMenu()">&times;</span>
        <div class="menu-content">
            <div class="dev-info">
                <h3>Developer</h3>
                <p>안녕하세요 파수범입니다.<br>이것은 저의 첫 코딩 작품입니다.<br>많은 관심 부탁드립니다.</p>
            </div>
            <h3>테마 설정</h3>
            <div class="theme-buttons">
                <button onclick="changeTheme('#FF3B30')">빨강</button>
                <button onclick="changeTheme('#FF9500')">주황</button>
                <button onclick="changeTheme('#FFCC00')">노랑</button>
                <button onclick="changeTheme('#4CD964')">초록</button>
                <button onclick="changeTheme('#007AFF')">파랑</button>
                <button onclick="changeTheme('#5AC8FA')">하늘</button>
                <button onclick="changeTheme('#8E8E93')">회색</button>
                <button onclick="changeTheme('#000000')">검정</button>
            </div>
        </div>
    </div>

    <div class="calculator">
        <div class="calc-header">
            <span class="hamburger" onclick="openMenu()" style="cursor:pointer;">&#9776;</span>
            <span>계산기</span>
        </div>
        <input type="text" id="display" value="0" readonly>
        <div class="buttons">
            <button onclick="memory('MC')">MC</button>
            <button onclick="memory('MR')">MR</button>
            <button onclick="memory('M+')">M+</button>
            <button onclick="memory('M-')">M-</button>
            <button class="btn-ac" onclick="clearDisplay()">AC</button>
            <button class="operator" onclick="calculate()" style="grid-column: span 2;">=</button>
            <button class="operator" onclick="appendToDisplay('/')">÷</button>
            <button onclick="appendToDisplay('7')">7</button>
            <button onclick="appendToDisplay('8')">8</button>
            <button onclick="appendToDisplay('9')">9</button>
            <button class="operator" onclick="appendToDisplay('*')">×</button>
            <button onclick="appendToDisplay('4')">4</button>
            <button onclick="appendToDisplay('5')">5</button>
            <button onclick="appendToDisplay('6')">6</button>
            <button class="operator" onclick="appendToDisplay('-')">-</button>
            <button onclick="appendToDisplay('1')">1</button>
            <button onclick="appendToDisplay('2')">2</button>
            <button onclick="appendToDisplay('3')">3</button>
            <button class="operator" onclick="appendToDisplay('+')">+</button>
            <button onclick="appendToDisplay('0')" style="grid-column: span 2;">0</button>
            <button onclick="appendToDisplay('.')">.</button>
            <button class="operator" onclick="calculate()">=</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
