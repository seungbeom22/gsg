<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculator</title>
    <style>
        :root { --main-theme: #ff9500; --text-color: #000; }
        * { -webkit-user-select: none; user-select: none; box-sizing: border-box; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #f2f4f7; display: flex; justify-content: center; align-items: center; }
        .layout { display: flex; align-items: flex-start; gap: 0; }
        
        /* 계산기 전체 패딩 축소 */
        .calculator { width: 360px; background: #fff; padding: 12px; border-radius: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.12); }
        .calc-header { display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 10px; font-weight: bold; font-size: 20px; }
        .hamburger { font-size: 28px; cursor: pointer; position: absolute; left: 0; z-index: 2; }
        .title-text { display: flex; align-items: baseline; gap: 6px; }
        .display-wrap { margin-bottom: 10px; position: relative; }
        .display-bottom { font-size: 11px; color: #aaa; padding-left: 4px; min-height: 16px; margin-top: 2px; }
        .mem-status { font-size: 11px; color: #888; font-weight: bold; min-height: 16px; margin-bottom: 4px; padding-left: 2px; }
        
        #display { width: 100%; height: 60px; font-size: 38px; text-align: right; border: 2px solid #ddd; border-radius: 10px; padding: 8px 12px; background: #fafafa; display: block; outline: none; }
        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        
        /* 버튼 높이 축소 */
        button { height: 55px; border-radius: 14px; border: none; font-size: 28px; font-weight: bold; cursor: pointer; background: #e0e0e0; transition: opacity 0.1s; }
        button:active { opacity: 0.7; }
        .operator { background-color: var(--main-theme); color: var(--text-color); }
        .btn-ac { background-color: #ff3b30; color: #fff; }
        .btn-del { background-color: #ff9500; color: #fff; }
        .btn-equals { background-color: var(--main-theme); color: var(--text-color); }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 998; }
        .overlay.show { display: block; }
        .side-menu { height: 100%; width: 260px; position: fixed; top: 0; left: 0; background: #111; overflow: hidden; transition: transform 0.3s ease; z-index: 1000; transform: translateX(-100%); }
        .side-menu.open { transform: translateX(0); }
        .closebtn { position: absolute; top: 10px; right: 20px; color: #ff3b30; font-size: 36px; cursor: pointer; }
        .menu-content { padding: 18px; color: #fff; margin-top: 50px; }
        .theme-buttons { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .theme-buttons button { height: auto; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; padding: 10px; font-size: 13px; }
        .dev-info { margin-bottom: 18px; }
    </style>
</head>
<body>
    <div id="overlay" class="overlay" onclick="closeMenu()"></div>
    <div id="mySidenav" class="side-menu">
        <span class="closebtn" onclick="closeMenu()">&times;</span>
        <div class="menu-content">
            <div class="dev-info">
                <h3>Developer</h3>
                <p>안녕하세요 파수범입니다.<br>이것은 저의 첫 코딩 작품입니다.<br>많은 관심 부탁드립니다.</p>
            </div>
            <h3>테마 설정</h3>
            <div class="theme-buttons">
                <button onclick="changeTheme('#FF3B30','#fff')" style="background:#FF3B30;color:#fff;">빨강</button>
                <button onclick="changeTheme('#FF9500','#000')" style="background:#FF9500;color:#fff;">주황</button>
                <button onclick="changeTheme('#FFCC00','#000')" style="background:#FFCC00;color:#000;">노랑</button>
                <button onclick="changeTheme('#4CD964','#000')" style="background:#4CD964;color:#000;">초록</button>
                <button onclick="changeTheme('#007AFF','#fff')" style="background:#007AFF;color:#fff;">파랑</button>
                <button onclick="changeTheme('#5AC8FA','#000')" style="background:#5AC8FA;color:#000;">하늘</button>
                <button onclick="changeTheme('#8E8E93','#fff')" style="background:#8E8E93;color:#fff;">회색</button>
                <button onclick="changeTheme('#000000','#fff')" style="background:#000000;color:#fff;">검정</button>
            </div>
        </div>
    </div>

    <div class="layout">
        <div class="calculator">
            <div class="calc-header">
                <span class="hamburger" onclick="openMenu()">&#9776;</span>
                <span class="title-text">계산기 <small>v2.0</small></span>
            </div>
            <div id="mem-status" class="mem-status"></div>
            <div class="display-wrap">
                <input type="text" id="display" value="0" readonly>
            </div>
            <div class="buttons">
                <button onclick="memory('MC')">MC</button>
                <button onclick="memory('MR')">MR</button>
                <button onclick="memory('M+')">M+</button>
                <button onclick="memory('M-')">M-</button>
                <button class="btn-ac" onclick="clearDisplay()">AC</button>
                <button class="btn-del" onclick="deleteLast()">⌫</button>
                <button class="operator" onclick="inputOp('/')">÷</button>
                <button class="operator" onclick="inputOp('*')">×</button>
                <button onclick="inputNum('7')">7</button>
                <button onclick="inputNum('8')">8</button>
                <button onclick="inputNum('9')">9</button>
                <button class="operator" onclick="inputOp('-')">-</button>
                <button onclick="inputNum('4')">4</button>
                <button onclick="inputNum('5')">5</button>
                <button onclick="inputNum('6')">6</button>
                <button class="operator" onclick="inputOp('+')">+</button>
                <button onclick="inputNum('1')">1</button>
                <button onclick="inputNum('2')">2</button>
                <button onclick="inputNum('3')">3</button>
                <button class="operator" onclick="calcPercent()">%</button>
                <button class="btn-zero" onclick="inputNum('0')">0</button>
                <button class="btn-dot" onclick="inputDot()">.</button>
                <button class="operator btn-equals" onclick="calculate()" style="grid-column:span 2;">=</button>
            </div>
        </div>
    </div>

    <script>
        let numA = null, op = null, numB = null;
        let aStr = '0';    // A 숫자 문자열
        let bStr = '';     // B 숫자 입력 중 문자열
        let fullExpr = ''; // 화면에 보여줄 전체 식 (예: "50 ÷ 2 ×")
        let justCalc = false;
        let memValue = 0;

        const disp = () => document.getElementById('display');

        function sym(o) { return o==='*'?'×':o==='/'?'÷':o; }

        function fmtN(n) {
            if (n===null||isNaN(n)) return '오류';
            let v = parseFloat(n.toPrecision(10));
            if (!Number.isInteger(v)) v = parseFloat(v.toFixed(3));
            return v.toString();
        }

        function fmtD(s) {
            if (s==='오류') return s;
            let p = s.toString().split('.');
            p[0] = p[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            return p.join('.');
        }

        function inputNum(n) {
            if (justCalc) {
                // 계산 직후 숫자 → 새 계산 시작
                numA=null; op=null; numB=null; justCalc=false;
                aStr=n; bStr=''; fullExpr=n;
                disp().value = n; return;
            }
            if (op === null) {
                // A 입력 중
                aStr = (aStr==='0') ? n : aStr+n;
                fullExpr = aStr;
                disp().value = fmtD(aStr);
            } else {
                // B 입력 중
                bStr = (bStr==='') ? n : bStr+n;
                numB = 'typing';
                // fullExpr = "50 ÷ 2" 형태로 갱신 (연산자까지 있던 부분 + bStr)
                const opPart = fullExpr.endsWith(' '+sym(op)) ? fullExpr : fullExpr.split(' ').slice(0,-1).join(' ');
                disp().value = opPart + ' ' + fmtD(bStr);
            }
        }

        function inputDot() {
            if (justCalc) { numA=null;op=null;numB=null;justCalc=false; aStr='0.';bStr='';fullExpr='0.';disp().value='0.';return; }
            if (op===null) {
                if (!aStr.includes('.')) { aStr+='.'; fullExpr=aStr; disp().value=aStr; }
            } else {
                if (bStr==='') bStr='0';
                if (!bStr.includes('.')) {
                    bStr+='.'; numB='typing';
                    disp().value = fullExpr + ' ' + bStr;
                }
            }
        }

        function inputOp(o) {
            justCalc = false;
            if (op!==null && numB==='typing') {
                // 연속 연산: 내부 계산 갱신, 화면엔 전체 식 누적
                numA = doCalc(numA, op, parseFloat(bStr));
                numA = isNaN(numA) ? 0 : parseFloat(numA.toPrecision(10));
                // fullExpr에 방금 입력한 bStr과 새 연산자 추가
                fullExpr = fullExpr.endsWith(' '+sym(op))
                    ? fullExpr + ' ' + fmtD(bStr) + ' ' + sym(o)
                    : fullExpr + ' ' + fmtD(bStr) + ' ' + sym(o);
            } else {
                numA = parseFloat(aStr) || 0;
                fullExpr = fmtD(aStr) + ' ' + sym(o);
            }
            op=o; numB=null; bStr='';
            disp().value = fullExpr;
        }

        function doCalc(a, operator, b) {
            switch(operator) {
                case '+': return a+b;
                case '-': return a-b;
                case '*': return a*b;
                case '/': return b===0?NaN:a/b;
            }
            return b;
        }

        function calculate() {
            if (op===null) return;
            const b = bStr==='' ? numA : parseFloat(bStr);
            let result = doCalc(numA, op, b);
            result = parseFloat(parseFloat(result).toPrecision(10));
            op=null; numB=null; bStr=''; fullExpr=''; justCalc=true;
            if (isNaN(result)) { aStr='오류'; disp().value='오류'; }
            else { aStr=fmtN(result); numA=result; disp().value=fmtD(aStr); }
        }

        function calcPercent() {
            const cur = op===null ? parseFloat(aStr) : parseFloat(bStr||'0');
            if (isNaN(cur)) return;
            let result = (op!==null&&numA!==null) ? numA*(cur/100) : cur/100;
            result = parseFloat(result.toPrecision(10));
            const rs = fmtN(result);
            if (op===null) { aStr=rs; fullExpr=rs; }
            else { bStr=rs; numB=result; }
            disp().value = fmtD(rs);
            justCalc=true;
        }

        function clearDisplay() {
            numA=null;op=null;numB=null;justCalc=false;
            aStr='0'; bStr=''; fullExpr=''; disp().value='0';
        }

        function deleteLast() {
            if (justCalc||op!==null) { clearDisplay(); return; }
            aStr = aStr.length>1 ? aStr.slice(0,-1) : '0';
            fullExpr = aStr;
            disp().value = fmtD(aStr);
        }

        function updateMemStatus() {
            const el=document.getElementById('mem-status');
            el.textContent = memValue===0 ? '' : 'M: '+fmtD(fmtN(memValue));
        }
        function memory(m) {
            const cur = parseFloat(op===null ? aStr : (bStr||'0')) || 0;
            if (m==='MC') { memValue=0; }
            else if (m==='MR') {
                aStr=fmtN(memValue); bStr=''; op=null; numA=parseFloat(aStr); numB=null; justCalc=false;
                fullExpr=aStr; disp().value=fmtD(aStr);
            }
            else if (m==='M+') memValue=parseFloat((memValue+cur).toPrecision(10));
            else if (m==='M-') memValue=parseFloat((memValue-cur).toPrecision(10));
            updateMemStatus();
        }

        function openMenu() {
            document.getElementById('mySidenav').classList.add('open');
            document.getElementById('overlay').classList.add('show');
            history.pushState({ menuOpen: true }, '');
        }
        function closeMenu() {
            document.getElementById('mySidenav').classList.remove('open');
            document.getElementById('overlay').classList.remove('show');
            if (history.state && history.state.menuOpen) {
                history.back();
            }
        }
        window.addEventListener('popstate', function() {
            document.getElementById('mySidenav').classList.remove('open');
            document.getElementById('overlay').classList.remove('show');
        });
        function changeTheme(color, textColor) {
            document.documentElement.style.setProperty('--main-theme', color);
            document.documentElement.style.setProperty('--text-color', textColor||'#000');
            localStorage.setItem('theme-color', color);
            localStorage.setItem('theme-text', textColor||'#000');
            closeMenu();
        }
        (function loadSavedTheme() {
            const color=localStorage.getItem('theme-color');
            const tc=localStorage.getItem('theme-text');
            if (color) {
                document.documentElement.style.setProperty('--main-theme', color);
                document.documentElement.style.setProperty('--text-color', tc||'#000');
            }
        })();
    </script>
</body>
</html>
